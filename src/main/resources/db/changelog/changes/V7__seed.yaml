  # ── tickets ───────────────────────────────────────────────────────────────────
  # Device–category mapping:
  #   DEV-001 PC-001           → Network & IT  → jane_tech (ADVANCED)
  #   DEV-002 Air conditioner  → HVAC          → john_tech (INTERMEDIATE)
  #   DEV-003 Ceiling Projector→ Electrical    → john_tech (EXPERT)
  #   DEV-004 Front-door       → Structural    → john_tech (BEGINNER)
  #   DEV-005 Light-1          → Electrical    → john_tech (EXPERT)
