              INSERT INTO comments (ticket_id, user_id, content, created_at, updated_at) VALUES
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-001'), (SELECT id FROM users WHERE username='admin'),     'Acknowledged. Electrical technician dispatched to B1-101 immediately.', '2026-01-10 08:20:00', '2026-01-10 08:20:00'),
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-001'), (SELECT id FROM users WHERE username='john_tech'), 'On site. Found loose neutral wire on Light-1 causing arcing. Re-terminated and secured. Circuit stable.', '2026-01-10 11:00:00', '2026-01-10 11:00:00'),
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-002'), (SELECT id FROM users WHERE username='john_tech'), 'Refrigerant level low. Topped up and cleaned filters. AC back to normal cooling.', '2026-02-05 14:30:00', '2026-02-05 14:30:00'),
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-003'), (SELECT id FROM users WHERE username='jane_tech'), 'NIC driver corrupted. Reinstalled driver and ran network diagnostics. PC-001 back on campus network.', '2026-03-12 15:45:00', '2026-03-12 15:45:00'),
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-005'), (SELECT id FROM users WHERE username='john_tech'), 'Projector internal fuse blown. Replaced fuse and tested — now powering on and displaying correctly.', '2026-04-20 15:00:00', '2026-04-20 15:00:00');

