      id: V7-seed-tickets
      author: admin
      changes:
        - sql:
            splitStatements: false
            sql: |
              INSERT INTO tickets (
                ticket_number, category_id, device_id,
                status, severity_avg, severity_level, description,
                reported_by, assigned_technician_id, assignment_notes,
                reporter_count,
                submitted_at, ack_at, assigned_at, in_progress_at, resolved_at, closed_at,
                sla_ack_breached, sla_resolve_breached, sla_closure_breached,
                created_at, updated_at
              ) VALUES
              (
                'TKT-2026-001',
                (SELECT id FROM categories WHERE name='Electrical Issues'),
                (SELECT id FROM devices WHERE device_code='DEV-005'),
                'CLOSED', 4.0, 'HIGH',
                'Light-1 in B1-101 flickering and tripping the circuit breaker. Room unusable during lab sessions.',
                (SELECT id FROM users WHERE username='alice_req'),
                (SELECT id FROM users WHERE username='john_tech'),
                'Assigned to john_tech — electrical expert.',
