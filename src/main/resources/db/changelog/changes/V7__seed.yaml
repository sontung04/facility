            sql: |
              INSERT INTO reports (ticket_id, requester_id, severity_score, description, created_at) VALUES
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-001'), (SELECT id FROM users WHERE username='alice_req'), 4.0, 'Light-1 tripping breaker confirmed. Two lab PCs lost power mid-session. Room marked unsafe.', '2026-01-10 08:05:00'),
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-002'), (SELECT id FROM users WHERE username='bob_req'),   2.8, 'AC unit running but blowing warm air. Thermometer reads 30°C. Students reporting discomfort.', '2026-02-05 10:05:00'),
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-003'), (SELECT id FROM users WHERE username='carol_req'), 3.5, 'PC-001 shows no network adapter in device manager. Likely driver or NIC failure.', '2026-03-12 14:05:00'),
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-004'), (SELECT id FROM users WHERE username='alice_req'), 1.8, 'Door latch spring broken. Door swings open freely. Security concern after hours.', '2026-04-01 09:05:00'),
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-005'), (SELECT id FROM users WHERE username='bob_req'),   2.5, 'Projector power LED red. No image output. Tried different power socket — same result.', '2026-04-20 10:05:00');

  # ── comments ──────────────────────────────────────────────────────────────────
  - changeSet:
      id: V7-seed-comments
      author: admin
      changes:
