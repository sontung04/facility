                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-002'), 'ACK_BREACH',     '2026-02-05 10:30:00', NULL,                   false, '2026-02-05 10:00:00'),
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-003'), 'RESOLVE_BREACH', '2026-03-12 16:00:00', NULL,                   false, '2026-03-12 14:00:00'),
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-004'), 'ACK_BREACH',     '2026-04-01 10:00:00', '2026-04-01 11:00:00', true,  '2026-04-01 09:00:00'),
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-005'), 'RESOLVE_BREACH', '2026-04-20 14:00:00', NULL,                   false, '2026-04-20 10:00:00');

