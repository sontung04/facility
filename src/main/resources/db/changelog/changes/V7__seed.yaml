              ),
              (
                'TKT-2026-002',
                (SELECT id FROM categories WHERE name='HVAC'),
                (SELECT id FROM devices WHERE device_code='DEV-002'),
                'RESOLVED', 2.8, 'MEDIUM',
                'Air conditioner in B1-101 not cooling. Room temperature reaching 30°C, affecting student practice sessions.',
                (SELECT id FROM users WHERE username='bob_req'),
                (SELECT id FROM users WHERE username='john_tech'),
                'Assigned to john_tech — HVAC intermediate skill.',
                1,
                '2026-02-05 10:00:00', '2026-02-05 10:25:00', '2026-02-05 11:00:00',
                '2026-02-05 11:30:00', '2026-02-05 15:00:00', NULL,
                false, false, false,
                '2026-02-05 10:00:00', '2026-02-05 15:00:00'
              ),
              (
                'TKT-2026-003',
                (SELECT id FROM categories WHERE name='Network & IT'),
                (SELECT id FROM devices WHERE device_code='DEV-001'),
                'RESOLVED', 3.5, 'HIGH',
                'PC-001 in B1-101 cannot connect to campus network. Students unable to access lab exercises.',
