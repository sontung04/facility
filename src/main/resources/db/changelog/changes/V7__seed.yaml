                ((SELECT id FROM users WHERE username='carol_req'), (SELECT id FROM tickets WHERE ticket_number='TKT-2026-003'), 'COMMENT',        'Technician Update on TKT-2026-003',           'jane_tech: NIC driver reinstalled. PC-001 is back on the campus network.',                         false, '2026-03-12 15:45:00');
