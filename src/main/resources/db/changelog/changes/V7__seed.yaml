                ((SELECT id FROM users WHERE username='admin'),     'ASSIGN_TICKET',      'TICKET', (SELECT id FROM tickets WHERE ticket_number='TKT-2026-001'), '{"assignedTo":"john_tech","status":{"from":"ACK","to":"ASSIGNED"}}',              '2026-01-10 09:00:00'),
                ((SELECT id FROM users WHERE username='john_tech'), 'START_TICKET',       'TICKET', (SELECT id FROM tickets WHERE ticket_number='TKT-2026-001'), '{"status":{"from":"ASSIGNED","to":"IN_PROGRESS"}}',                               '2026-01-10 09:30:00'),
                ((SELECT id FROM users WHERE username='john_tech'), 'RESOLVE_TICKET',     'TICKET', (SELECT id FROM tickets WHERE ticket_number='TKT-2026-001'), '{"status":{"from":"IN_PROGRESS","to":"RESOLVED"}}',                               '2026-01-10 13:00:00'),
                ((SELECT id FROM users WHERE username='admin'),     'CLOSE_TICKET',       'TICKET', (SELECT id FROM tickets WHERE ticket_number='TKT-2026-001'), '{"status":{"from":"RESOLVED","to":"CLOSED"}}',                                    '2026-01-11 09:00:00');

  # ── resolution_feedback (one per ticket — unique constraint on ticket_id) ─────
  - changeSet:
      id: V7-seed-resolution-feedback
      author: admin
      changes:
        - sql:
            sql: |
              INSERT INTO resolution_feedback (ticket_id, technician_id, rated_by, rating, comment, created_at) VALUES
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-001'), (SELECT id FROM users WHERE username='john_tech'), (SELECT id FROM users WHERE username='alice_req'), 5, 'Fixed quickly. B1-101 back in service the same day. Very professional.',           '2026-01-11 10:00:00'),
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-002'), (SELECT id FROM users WHERE username='john_tech'), (SELECT id FROM users WHERE username='bob_req'),   4, 'AC working well now. Took half a day but room is comfortable again.',               '2026-02-06 09:00:00'),
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-003'), (SELECT id FROM users WHERE username='jane_tech'), (SELECT id FROM users WHERE username='carol_req'), 5, 'Jane diagnosed and fixed the network issue in under 2 hours. Excellent service.',  '2026-03-13 09:00:00'),
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-004'), (SELECT id FROM users WHERE username='john_tech'), (SELECT id FROM users WHERE username='alice_req'), 4, 'Door latch replaced and works perfectly. Prompt response appreciated.',             '2026-04-02 09:00:00'),
                ((SELECT id FROM tickets WHERE ticket_number='TKT-2026-005'), (SELECT id FROM users WHERE username='john_tech'), (SELECT id FROM users WHERE username='bob_req'),   4, 'Projector repaired same day. Fuse replacement was clean and quick.',               '2026-04-21 10:00:00');

