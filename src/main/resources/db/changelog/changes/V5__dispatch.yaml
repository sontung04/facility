databaseChangeLog:

  # ── dispatch_history ──────────────────────────────────────────────────────────
  # Merged: original create (changeset 9) + previous_technician_id (was changeset 16)
  - changeSet:
      id: V5-create-dispatch-history
      author: admin
      changes:
        - createTable:
            tableName: dispatch_history
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: ticket_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_dispatch_ticket
                    references: tickets(id)
              - column:
                  name: technician_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_dispatch_technician
                    references: users(id)
              - column:
                  name: previous_technician_id
                  type: BIGINT
              - column:
                  name: dispatcher_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_dispatch_dispatcher
                    references: users(id)
              - column:
                  name: dispatch_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - createIndex:
            indexName: idx_dispatch_ticket_id
            tableName: dispatch_history
            columns:
              - column:
                  name: ticket_id
        - createIndex:
            indexName: idx_dispatch_technician_id
            tableName: dispatch_history
            columns:
              - column:
                  name: technician_id
