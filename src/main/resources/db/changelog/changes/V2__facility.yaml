databaseChangeLog:

  # ── categories ───────────────────────────────────────────────────────────────
  - changeSet:
      id: V2-create-categories
      author: admin
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValue: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - createIndex:
            indexName: idx_categories_name
            tableName: categories
            columns:
              - column:
                  name: name

  # ── buildings ────────────────────────────────────────────────────────────────
  - changeSet:
      id: V2-create-buildings
      author: admin
      changes:
        - createTable:
            tableName: buildings
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: VARCHAR(255)
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValue: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - createIndex:
            indexName: idx_buildings_name
            tableName: buildings
            columns:
              - column:
                  name: name

  # ── rooms ─────────────────────────────────────────────────────────────────────
  - changeSet:
      id: V2-create-rooms
      author: admin
      changes:
        - createTable:
            tableName: rooms
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: building_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_rooms_building
                    references: buildings(id)
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: floor_number
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - createIndex:
            indexName: idx_rooms_building_id
            tableName: rooms
            columns:
              - column:
                  name: building_id

  # ── devices ───────────────────────────────────────────────────────────────────
  - changeSet:
      id: V2-create-devices
      author: admin
      changes:
        - createTable:
            tableName: devices
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: room_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_devices_room
                    references: rooms(id)
              - column:
                  name: device_code
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: device_type
                  type: VARCHAR(100)
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: location_3d_x
                  type: FLOAT
              - column:
                  name: location_3d_y
                  type: FLOAT
              - column:
                  name: location_3d_z
                  type: FLOAT
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValue: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - createIndex:
            indexName: idx_devices_room_id
            tableName: devices
            columns:
              - column:
                  name: room_id
        - createIndex:
            indexName: idx_devices_device_code
            tableName: devices
            columns:
              - column:
                  name: device_code

  # ── technician_skills ─────────────────────────────────────────────────────────
  # Merged: original create + available column (was changeset 15)
  - changeSet:
      id: V2-create-technician-skills
      author: admin
      changes:
        - createTable:
            tableName: technician_skills
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_tech_skills_user
                    references: users(id)
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_tech_skills_category
                    references: categories(id)
              - column:
                  name: skill_level
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: max_concurrent_jobs
                  type: INT
                  defaultValue: 5
              - column:
                  name: available
                  type: BOOLEAN
                  defaultValue: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - createIndex:
            indexName: idx_tech_skills_user_id
            tableName: technician_skills
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_tech_skills_category_id
            tableName: technician_skills
            columns:
              - column:
                  name: category_id
        - addUniqueConstraint:
            tableName: technician_skills
            columnNames: user_id,category_id
            constraintName: uk_tech_skills_user_category
