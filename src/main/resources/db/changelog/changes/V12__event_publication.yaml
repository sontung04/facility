databaseChangeLog:

  - changeSet:
      id: V12-create-event-publication
      author: system
      comment: "Spring Modulith JPA event publication table required by spring-modulith-events-jpa"
      changes:
        - createTable:
            tableName: event_publication
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: listener_id
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
              - column:
                  name: serialized_event
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: publication_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: completion_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: true
              - column:
                  name: last_resubmission_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: true
              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: completion_attempts
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
