databaseChangeLog:

  # ── notifications ─────────────────────────────────────────────────────────────
  - changeSet:
      id: V6-create-notifications
      author: admin
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_notif_user
                    references: users(id)
              - column:
                  name: ticket_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_notif_ticket
                    references: tickets(id)
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: is_read
                  type: BOOLEAN
                  defaultValue: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - createIndex:
            indexName: idx_notif_user_id
            tableName: notifications
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_notif_ticket_id
            tableName: notifications
            columns:
              - column:
                  name: ticket_id
        - createIndex:
            indexName: idx_notif_created_at
            tableName: notifications
            columns:
              - column:
                  name: created_at
